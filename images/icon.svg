  <text x="64" y="52" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle">TS</text>
  <!-- Graph nodes -->
  <circle cx="40" cy="82" r="10" fill="none" stroke="white" stroke-width="2.5"/>
  <circle cx="88" cy="82" r="10" fill="none" stroke="white" stroke-width="2.5"/>
  <circle cx="64" cy="106" r="10" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Graph edges -->
  <line x1="48" y1="88" x2="58" y2="100" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="80" y1="88" x2="70" y2="100" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="50" y1="82" x2="78" y2="82" stroke="white" stroke-width="2" opacity="0.7"/>
  <!-- Small dots in nodes -->
  <circle cx="40" cy="82" r="3" fill="white"/>
